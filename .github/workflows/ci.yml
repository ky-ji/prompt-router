name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Run tests
        run: PYTHONPATH=src python -m unittest discover -s tests
      - name: Compile package
        run: python -m compileall -q src
